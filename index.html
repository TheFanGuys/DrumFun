<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0c">
<title>BeatForge Tap Pad</title>
<style>
  :root{
    --bg:#0a0a0c;
    --amber:#ffb547;
    --green:#34d399;
    --violet:#b07bff;
    --red:#ff5a5f;
    --blue:#4cc6ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    touch-action:none;overscroll-behavior:none;user-select:none;-webkit-user-select:none;}

  /* full-screen stage that fits the photo no matter the orientation */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #kit{position:relative;line-height:0;
    /* keep the photo's exact aspect ratio while fitting the screen */
    width:min(100vw, calc(100vh * (1536/1024)));
    aspect-ratio:1536 / 1024;
    box-shadow:0 0 120px rgba(0,0,0,.6) inset;}
  #kit img{width:100%;height:100%;object-fit:cover;display:block;border-radius:2px;
    -webkit-user-drag:none;user-drag:none;pointer-events:none;}

  /* tap targets */
  .pad{position:absolute;transform:translate(-50%,-50%);
    border-radius:50%;cursor:pointer;touch-action:none;
    display:flex;align-items:center;justify-content:center;}
  .pad .ring{position:absolute;inset:0;border-radius:50%;
    border:2px solid var(--c);opacity:.16;
    box-shadow:0 0 18px -4px var(--c);transition:opacity .15s;}
  body.hideTargets .pad .ring{opacity:0;}
  .pad .core{position:absolute;inset:14%;border-radius:50%;
    background:radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--c) 38%, transparent), transparent 70%);
    opacity:0;transition:opacity .08s;}
  /* the satisfying shockwave on hit */
  .pad .wave{position:absolute;inset:0;border-radius:50%;
    border:2px solid var(--c);opacity:0;pointer-events:none;}
  .pad.hit .core{opacity:1;transition:opacity .02s;}
  .pad.hit .ring{opacity:.9;}
  .pad.hit .wave{animation:pop .42s ease-out;}
  @keyframes pop{
    0%{opacity:.85;transform:scale(.55);}
    100%{opacity:0;transform:scale(1.55);}
  }
  @media (prefers-reduced-motion: reduce){
    .pad.hit .wave{animation:none;}
  }

  /* tiny floating controls */
  #hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:12px;right:12px;
    display:flex;align-items:center;gap:10px;z-index:5;pointer-events:none;}
  #brand{font-weight:800;letter-spacing:.5px;font-size:15px;color:#fff;
    text-shadow:0 1px 6px rgba(0,0,0,.8);}
  #brand b{color:var(--violet);font-weight:800;}
  #spacer{flex:1;}
  .btn{pointer-events:auto;background:rgba(20,20,26,.66);color:#dfe2ea;
    border:1px solid rgba(255,255,255,.14);border-radius:999px;
    padding:8px 14px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);cursor:pointer;}
  .btn:active{transform:scale(.96);}

  #rotateHint{position:fixed;bottom:max(14px,env(safe-area-inset-bottom));left:0;right:0;
    text-align:center;color:#9aa0ad;font-size:12px;z-index:5;pointer-events:none;
    text-shadow:0 1px 4px #000;display:none;}
  @media (orientation:portrait){#rotateHint{display:block;}}

  /* start gate (required so iOS lets sound play) */
  #gate{position:fixed;inset:0;z-index:20;background:radial-gradient(120% 120% at 50% 30%, #14141c, #050507);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    text-align:center;padding:24px;cursor:pointer;}
  #gate .logo{font-size:34px;font-weight:800;letter-spacing:1px;color:#fff;}
  #gate .logo b{color:var(--violet);}
  #gate .sub{color:#aeb3bf;font-size:15px;max-width:300px;line-height:1.5;}
  #gate .go{margin-top:6px;color:#fff;border:1px solid rgba(255,255,255,.25);
    padding:14px 26px;border-radius:999px;font-weight:700;font-size:15px;
    background:rgba(176,123,255,.18);box-shadow:0 0 40px -8px var(--violet);}
  #gate .pulse{animation:breathe 1.8s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.85;}50%{opacity:1;}}
</style>
</head>
<body class="hideTargets">

    <div class="logo">BEAT<b>FORGE</b></div>
    <div class="sub">Tap the drums to play them. Nine pads, real drum sounds, works with no signal.</div>
    <div class="go pulse">Tap anywhere to start</div>
  </div>

  <div id="hud">
    <div id="brand">BEAT<b>FORGE</b> Tap Pad</div>
    <div id="spacer"></div>
    <button class="btn" id="toggleTargets">Show targets</button>
  </div>

  <script>
  (function(){
    // ---- pad layout (centres & sizes as % of the photo) ----
    // x,y = centre in % ; d = diameter in % of photo width ; c = accent colour
    const PADS = [
      {id:'crash1', label:'Crash 1', x:19.5, y:18.1, d:24.7, c:'var(--amber)'},
      {id:'ride',   label:'Ride',    x:80.4, y:18.6, d:23.4, c:'var(--amber)'},
      {id:'crash2', label:'Crash 2', x:84.5, y:41.5, d:19.5, c:'var(--amber)'},
      {id:'hihat',  label:'Hi-Hat',  x:14.6, y:46.4, d:21.5, c:'var(--green)'},
      {id:'tom1',   label:'Tom 1',   x:42.0, y:32.7, d:15.3, c:'var(--violet)'},
      {id:'tom2',   label:'Tom 2',   x:59.9, y:33.2, d:15.3, c:'var(--violet)'},
      {id:'floortom',label:'Floor Tom',x:74.5,y:70.3, d:22.1, c:'var(--blue)'},
      {id:'snare',  label:'Snare',   x:35.7, y:64.0, d:18.9, c:'var(--violet)'},
      {id:'kick',   label:'Kick',    x:52.1, y:64.0, d:17.1, c:'var(--red)'},
    ];

    const kit = document.getElementById('kit');
    const pads = {};
    PADS.forEach(p=>{
      const el=document.createElement('div');
      el.className='pad';
      el.dataset.id=p.id;
      el.style.left=p.x+'%';
      el.style.top=p.y+'%';
      el.style.width=p.d+'%';
      el.style.aspectRatio='1';
      el.style.setProperty('--c',p.c);
      el.innerHTML='<div class="ring"></div><div class="core"></div><div class="wave"></div>';
      kit.appendChild(el);
      pads[p.id]=el;
    });

    // ---- audio engine (built on first tap) ----
    let ready=false, V=null;

    function buildVoices(){
      const out = new Tone.Limiter(-1.5).toDestination();

      // KICK
      const kick = new Tone.MembraneSynth({
        pitchDecay:0.045, octaves:8, oscillator:{type:'sine'},
        envelope:{attack:0.001, decay:0.42, sustain:0, release:0.18, attackCurve:'exponential'}
      }).connect(out);
      kick.volume.value=3;

      // SNARE = noise (band-passed) + short body
      const snareBus = new Tone.Filter(1900,'bandpass'); snareBus.Q.value=1.1; snareBus.connect(out);
      const snareNoise = new Tone.NoiseSynth({noise:{type:'white'},
        envelope:{attack:0.001, decay:0.16, sustain:0}}).connect(snareBus);
      snareNoise.volume.value=-4;
      const snareBody = new Tone.MembraneSynth({pitchDecay:0.012, octaves:3,
        envelope:{attack:0.001, decay:0.12, sustain:0, release:0.04}}).connect(out);
      snareBody.volume.value=-12;

      // shared cymbal tone-shaping bus (tames the fizz)
      const cymBus = new Tone.Filter(9000,'lowpass'); cymBus.connect(out);

      const hihat = new Tone.MetalSynth({
        frequency:360, envelope:{attack:0.001, decay:0.06, release:0.02},
        harmonicity:5.1, modulationIndex:32, resonance:6000, octaves:1.2
      }).connect(cymBus); hihat.volume.value=-20;

      const crash1 = new Tone.MetalSynth({
        frequency:300, envelope:{attack:0.001, decay:1.4, release:0.7},
        harmonicity:5.1, modulationIndex:50, resonance:3500, octaves:1.5
      }).connect(cymBus); crash1.volume.value=-16;

      const crash2 = new Tone.MetalSynth({
        frequency:380, envelope:{attack:0.001, decay:1.1, release:0.6},
        harmonicity:6.2, modulationIndex:46, resonance:4000, octaves:1.5
      }).connect(cymBus); crash2.volume.value=-16;

      const ride = new Tone.MetalSynth({
        frequency:480, envelope:{attack:0.001, decay:0.7, release:0.4},
        harmonicity:3.4, modulationIndex:16, resonance:7000, octaves:1.3
      }).connect(cymBus); ride.volume.value=-17;

      // TOMS
      const tom1 = new Tone.MembraneSynth({pitchDecay:0.08, octaves:4,
        envelope:{attack:0.001, decay:0.4, sustain:0, release:0.2}}).connect(out);
      const tom2 = new Tone.MembraneSynth({pitchDecay:0.09, octaves:4,
        envelope:{attack:0.001, decay:0.45, sustain:0, release:0.2}}).connect(out);
      const floortom = new Tone.MembraneSynth({pitchDecay:0.11, octaves:5,
        envelope:{attack:0.001, decay:0.6, sustain:0, release:0.3}}).connect(out);
      tom1.volume.value=1; tom2.volume.value=1; floortom.volume.value=2;

      return {
        kick:()=>kick.triggerAttackRelease('C1','8n'),
        snare:()=>{snareNoise.triggerAttackRelease('16n'); snareBody.triggerAttackRelease('D2','16n');},
        hihat:()=>hihat.triggerAttackRelease('32n'),
        tom1:()=>tom1.triggerAttackRelease('A2','8n'),
        tom2:()=>tom2.triggerAttackRelease('F2','8n'),
        floortom:()=>floortom.triggerAttackRelease('C2','4n'),
        crash1:()=>crash1.triggerAttackRelease('2n'),
        crash2:()=>crash2.triggerAttackRelease('2n'),
        ride:()=>ride.triggerAttackRelease('4n'),
      };
    }

    function flash(id){
      const el=pads[id]; if(!el) return;
      el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit');
      clearTimeout(el._t);
      el._t=setTimeout(()=>el.classList.remove('hit'),120);
    }

    function hit(id){
      if(!ready||!V) return;
      try{ V[id] && V[id](); }catch(e){}
      flash(id);
    }

    // ---- start gate (unlocks audio on iOS) ----
    const gate=document.getElementById('gate');
    async function start(){
      if(ready) return;
      try{
        await Tone.start();                          // user-gesture audio unlock
        const ctx=Tone.getContext().rawContext;
        if(ctx.state!=='running'){ try{ await ctx.resume(); }catch(_){} }
        Tone.getContext().lookAhead=0.03;            // snappy but safe (0 can drop hits on iOS)
        V=buildVoices();
        // nudge iOS audio awake with one inaudible tick
        try{ const s=new Tone.Oscillator(30,'sine').toDestination(); s.volume.value=-100; s.start(); s.stop('+0.03'); }catch(_){}
        ready=true;
        gate.style.display='none';
      }catch(e){
        gate.querySelector('.sub').textContent='Tap again to turn the sound on.';
      }
    }
    gate.addEventListener('pointerdown', start, {passive:true});
    gate.addEventListener('touchend',   start, {passive:true});
    // belt-and-suspenders: first touch anywhere unlocks audio if the gate missed it
    function firstTouch(){ if(!ready) start(); document.removeEventListener('pointerdown', firstTouch); }
    document.addEventListener('pointerdown', firstTouch, {passive:true});

    // ---- pad input: pointerdown = instant, no 300ms delay ----
    PADS.forEach(p=>{
      pads[p.id].addEventListener('pointerdown', e=>{
        e.preventDefault();
        hit(p.id);
      });
    });
    // block long-press / context menu on the photo
    kit.addEventListener('contextmenu', e=>e.preventDefault());

    // ---- desktop keys 1-9 (handy for testing, fun on a laptop) ----
    const keymap={'1':'kick','2':'snare','3':'hihat','4':'tom1','5':'tom2',
                  '6':'floortom','7':'crash1','8':'crash2','9':'ride'};
    window.addEventListener('keydown', e=>{
      if(!ready){ start(); }
      const id=keymap[e.key]; if(id) hit(id);
    });

    // ---- show/hide targets ----
    const tBtn=document.getElementById('toggleTargets');
    tBtn.addEventListener('click', ()=>{
      document.body.classList.toggle('hideTargets');
      tBtn.textContent=document.body.classList.contains('hideTargets')?'Show targets':'Hide targets';
    });
  })();
  </script>
