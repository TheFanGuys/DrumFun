<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0c">
<title>BeatForge Tap Pad</title>
<style>
  :root{
    --bg:#0a0a0c;--amber:#ffb547;--green:#34d399;--violet:#b07bff;--red:#ff5a5f;--blue:#4cc6ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    touch-action:none;overscroll-behavior:none;user-select:none;-webkit-user-select:none;}

  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #kit{position:relative;line-height:0;
    width:min(100vw, calc(100vh * (1536/1024)));
    aspect-ratio:1536 / 1024;
    box-shadow:0 0 120px rgba(0,0,0,.6) inset;}
  #kit img{width:100%;height:100%;object-fit:cover;display:block;border-radius:2px;
    -webkit-user-drag:none;user-drag:none;pointer-events:none;}

  .pad{position:absolute;transform:translate(-50%,-50%);border-radius:50%;cursor:pointer;
    touch-action:none;display:flex;align-items:center;justify-content:center;}
  .pad .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--c);
    opacity:.16;box-shadow:0 0 18px -4px var(--c);transition:opacity .15s;}
  body.hideTargets .pad .ring{opacity:0;}
  .pad .core{position:absolute;inset:14%;border-radius:50%;
    background:radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--c) 38%, transparent), transparent 70%);
    opacity:0;transition:opacity .08s;}
  .pad .wave{position:absolute;inset:0;border-radius:50%;border:2px solid var(--c);opacity:0;pointer-events:none;}
  .pad.hit .core{opacity:1;transition:opacity .02s;}
  .pad.hit .ring{opacity:.9;}
  .pad.hit .wave{animation:pop .42s ease-out;}
  @keyframes pop{0%{opacity:.85;transform:scale(.55);}100%{opacity:0;transform:scale(1.55);}}
  @media (prefers-reduced-motion: reduce){.pad.hit .wave{animation:none;}}

  #hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:12px;right:12px;
    display:flex;align-items:center;gap:10px;z-index:5;pointer-events:none;}
  #brand{font-weight:800;letter-spacing:.5px;font-size:15px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8);}
  #brand b{color:var(--violet);font-weight:800;}
  #spacer{flex:1;}
  .btn{pointer-events:auto;background:rgba(20,20,26,.66);color:#dfe2ea;border:1px solid rgba(255,255,255,.14);
    border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);cursor:pointer;}
  .btn:active{transform:scale(.96);}

  #toast{position:fixed;left:50%;bottom:max(54px,calc(env(safe-area-inset-bottom) + 40px));
    transform:translateX(-50%) translateY(8px);background:rgba(20,20,26,.82);color:#eef0f5;
    border:1px solid rgba(255,255,255,.16);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;
    z-index:8;opacity:0;pointer-events:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    transition:opacity .2s, transform .2s;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #rotateHint{position:fixed;bottom:max(14px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;
    color:#9aa0ad;font-size:12px;z-index:5;pointer-events:none;text-shadow:0 1px 4px #000;display:none;}
  @media (orientation:portrait){#rotateHint{display:block;}}

  #gate{position:fixed;inset:0;z-index:20;background:radial-gradient(120% 120% at 50% 30%, #14141c, #050507);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;
    padding:24px;cursor:pointer;}
  #gate .logo{font-size:34px;font-weight:800;letter-spacing:1px;color:#fff;}
  #gate .logo b{color:var(--violet);}
  #gate .sub{color:#aeb3bf;font-size:15px;max-width:300px;line-height:1.5;}
  #gate .go{margin-top:6px;color:#fff;border:1px solid rgba(255,255,255,.25);padding:14px 26px;border-radius:999px;
    font-weight:700;font-size:15px;background:rgba(176,123,255,.18);box-shadow:0 0 40px -8px var(--violet);}
  #gate .pulse{animation:breathe 1.8s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.85;}50%{opacity:1;}}
</style>
</head>
<body class="hideTargets">
  <div id="gate">
    <div class="logo">BEAT<b>FORGE</b></div>
    <div class="sub">Tap the drums to play them. Nine pads, real drum sounds, works with no signal.</div>
    <div class="go pulse">Tap anywhere to start</div>
  </div>

  <div id="hud">
    <div id="brand">BEAT<b>FORGE</b> Tap Pad</div>
    <div id="spacer"></div>
    <button class="btn" id="toggleTargets">Show targets</button>
  </div>

auHaCKXEUvURyLZGXleb0yJW0W6fNbw/DxV0CO2JOa7xsTzZNZJUupYsGV7pSfUmYimeMLjEXoLG+jTWXp3uMva4tuM1OTzLBFWmueS+6ttYk/9sW3afE6j9bsUNhfQcbgbkjq1iZpZN/NceXOrbs39WwLf/7csTsgFFyBVXHiLXCocAqerDQAQ8OUBx3ua8X1VtsUnkvCjWvvD6F72tLasGsS3hdgfUxAtGYYUZ1m2aNbp/////40Cv+J6R2xt1Jn2YHL////+NiktrX+ZvPuuegACAAABrJhiXlj/nCTJj69NRH/ORkAM/y2a/wM7OA4IxJPAqAC4UOKZJ+HrByIfKGWerxHIygBIYAwSCgXV/DAQhEDYOBtI0Ga6r/gUCgEghvhZMRxJGRiiy//HSFgQMELAeAAOBCkxQoGABiSa9f/5dIaQAMahZ0DHFyGBcMM+I5GIr0tX/8WsCIQDLlAubC+IooCBIuYdQGDMAECQGAIdCF8gMCGXqXXZSTor//8DGjhSIzIdCMsHEg2DSHECBusIDDjGRCyUPdFmgGCwMUFC9v7aWjLFVMQU1F//twxOUAHdojUbmXgAtbt+OXN0AAMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7csRtA8AAAaQcAAAgAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV"};
    const POOL_N = 4;                 // up to 4 overlapping hits per drum
    const POOLS = {};
    let started = false;

    function buildPools(){
      for(const id in CLIPS){
        const src = CLIPS[id];        // one shared data-URI string per drum
        const list = [];
        for(let i=0;i<POOL_N;i++){
          const a = new Audio();
          a.src = src; a.preload = 'auto';
          list.push(a);
        }
        POOLS[id] = { list, i:0 };
      }
    }

    // prime every element inside the first tap so iOS lets them play later
    function unlock(){
      for(const id in POOLS){
        POOLS[id].list.forEach(a=>{
          const p = a.play();
          if(p && p.then) p.then(()=>{ a.pause(); try{a.currentTime=0;}catch(_){ } }).catch(()=>{});
        });
      }
    }

    function play(id){
      const pool = POOLS[id]; if(!pool) return;
      const a = pool.list[pool.i];
      pool.i = (pool.i + 1) % pool.list.length;
      try{ a.currentTime = 0; }catch(_){}
      const p = a.play(); if(p && p.catch) p.catch(()=>{});
    }

    // ---------- start (synchronous = reliable iOS unlock) ----------
    const gate=document.getElementById('gate');
    function toast(msg){
      let t=document.getElementById('toast');
      if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
      t.textContent=msg; t.classList.add('show');
      clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1500);
    }
    function start(){
      if(started) return;
      started=true;
      buildPools();
      unlock();
      gate.style.display='none';
      toast('Sound on');
    }
    gate.addEventListener('pointerdown', start, {passive:true});
    gate.addEventListener('touchstart', start, {passive:true});
    gate.addEventListener('click', start);

    // ---------- play a pad ----------
    function hit(id){
      if(!started){ start(); return; }
      play(id);
      const el=pads[id];
      if(el){ el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit');
        clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('hit'),120); }
    }

    PADS.forEach(p=>{
      pads[p.id].addEventListener('pointerdown', e=>{ e.preventDefault(); hit(p.id); });
    });
    kit.addEventListener('contextmenu', e=>e.preventDefault());

    // desktop keys 1-9
    const keymap={'1':'kick','2':'snare','3':'hihat','4':'tom1','5':'tom2','6':'floortom','7':'crash1','8':'crash2','9':'ride'};
    window.addEventListener('keydown', e=>{ if(!built) start(); const id=keymap[e.key]; if(id) hit(id); });

    // show / hide targets
    const tBtn=document.getElementById('toggleTargets');
    tBtn.addEventListener('click', ()=>{
      document.body.classList.toggle('hideTargets');
      tBtn.textContent=document.body.classList.contains('hideTargets')?'Show targets':'Hide targets';
    });
  })();
  </script>
